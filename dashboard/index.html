<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrier Sales Operations</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #18202b;
      --muted: #667085;
      --line: #d9dee7;
      --teal: #087f8c;
      --green: #238636;
      --amber: #b7791f;
      --red: #c2410c;
      --blue: #315f9f;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 750;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .stamp {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .metric,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 112px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
    }

    .content {
      grid-template-columns: 1.05fr 0.95fr;
      align-items: start;
    }

    .panel {
      padding: 18px;
      overflow: hidden;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 750;
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 0 10px 9px 0;
      white-space: nowrap;
    }

    td {
      border-bottom: 1px solid #edf0f5;
      padding: 11px 10px 11px 0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .lane {
      font-weight: 690;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .pill-booked {
      background: #e9f7ec;
      border-color: #b8e3c1;
      color: var(--green);
    }

    .pill-decline {
      background: #fff4e5;
      border-color: #f1ce9a;
      color: var(--amber);
    }

    .pill-hostile {
      background: #fff0eb;
      border-color: #ffc9b8;
      color: var(--red);
    }

    .pill-friendly {
      background: #eaf4ff;
      border-color: #bddbff;
      color: var(--blue);
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(170px, 0.85fr) minmax(140px, 1fr) 70px;
      gap: 12px;
      align-items: center;
      min-height: 34px;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf0f5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
      min-width: 3px;
    }

    .bar-fill.secondary {
      background: var(--blue);
    }

    .opportunities {
      display: grid;
      gap: 12px;
    }

    .opportunity {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #edf0f5;
    }

    .opportunity:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .gap {
      color: var(--red);
      font-weight: 780;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .summary {
      max-width: 440px;
      color: #344054;
    }

    @media (max-width: 1100px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 1440px);
        padding-top: 18px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .stamp {
        text-align: left;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .panel {
        overflow-x: auto;
      }

      table {
        min-width: 760px;
      }

      .bar-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Carrier Sales Operations</h1>
        <div class="subtitle">Inbound call performance, pricing outcomes, and follow-up opportunities.</div>
      </div>
      <div class="stamp">
        <span id="dataSource">HappyRobot Twin</span><br>
        <span id="lastUpdated"></span>
      </div>
    </header>

    <section class="grid metrics" id="metrics"></section>

    <section class="grid content">
      <div class="stack">
        <section class="panel">
          <h2>Lane Performance</h2>
          <div class="bars" id="lanePerformance"></div>
        </section>

        <section class="panel">
          <h2>Recent Carrier Calls</h2>
          <table>
            <thead>
              <tr>
                <th>Carrier</th>
                <th>Lane</th>
                <th>Equipment</th>
                <th class="num">Ask</th>
                <th class="num">Last Offer</th>
                <th>Outcome</th>
                <th>Mood</th>
              </tr>
            </thead>
            <tbody id="recentCalls"></tbody>
          </table>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <h2>Follow-Up Opportunities</h2>
          <div class="opportunities" id="opportunities"></div>
        </section>

        <section class="panel">
          <h2>Pricing Mix</h2>
          <div class="bars" id="pricingMix"></div>
        </section>
      </div>
    </section>
  </main>

        letterboard_rate: 1850,
        last_offered_rate: 1800
      }
    ];

    const toNumber = (value) => {
      if (value === null || value === undefined || value === "") return null;
      if (String(value).toLowerCase() === "null") return null;
      const parsed = Number(value);
      return Number.isNaN(parsed) ? null : parsed;
    };

    const normalizeCall = (call) => ({
      ...call,
      offered_rate: toNumber(call.offered_rate),
      carrier_requested_rate: toNumber(call.carrier_requested_rate),
      final_rate: toNumber(call.final_rate),
      letterboard_rate: toNumber(call.letterboard_rate || call.loadboard_rate),
      last_offered_rate: toNumber(call.last_offered_rate),
      outcome: call.outcome || "Unknown",
      mood: call.mood || "Unknown",
      carrier_name: call.carrier_name || "Unknown carrier",
      mc_number: call.mc_number || "-",
      origin: call.origin || "Unknown origin",
      destination: call.destination || "Unknown destination",
      equipment_type: call.equipment_type || "-",
      summary: call.summary || "No summary captured.",
      created_at: call.created_at || new Date().toISOString()
    });

    const money = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(Number(value));
    };

    const percent = (value) => `${Math.round(value * 100)}%`;

    const isBooked = (call) => {
      const outcome = String(call.outcome || "").toLowerCase();
      return outcome.includes("sucess") || outcome.includes("success") || outcome.includes("booked") || call.final_rate !== null;
    };
    const isRateDecline = (call) => String(call.outcome || "").toLowerCase().includes("rate");
    const validAsk = (call) => Number(call.carrier_requested_rate) > 0 && Number(call.carrier_requested_rate) < 10000;
    const laneKey = (call) => `${call.origin} -> ${call.destination}`;

    const avg = (items, pick) => {
      const values = items.map(pick).filter((value) => value !== null && value !== undefined && !Number.isNaN(Number(value)));
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + Number(value), 0) / values.length;
    };

    function renderDashboard(rawCalls, sourceLabel) {
      const calls = rawCalls.map(normalizeCall);
      const sorted = [...calls].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const booked = calls.filter(isBooked);
      const declines = calls.filter(isRateDecline);
      const validGapCalls = calls.filter((call) => validAsk(call) && call.last_offered_rate);
      const avgGap = avg(validGapCalls, (call) => Number(call.carrier_requested_rate) - Number(call.last_offered_rate));
      const avgBookedRate = avg(booked, (call) => call.final_rate);
      const friendly = calls.filter((call) => call.mood === "Friendly").length;
      const hostile = calls.filter((call) => call.mood === "Hostile").length;

      document.getElementById("dataSource").textContent = sourceLabel;
      document.getElementById("lastUpdated").textContent = sorted.length
        ? new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeStyle: "short" }).format(new Date(sorted[0].created_at))
        : "No calls captured yet";

      const metricItems = [
        ["Total Calls", calls.length, "Carrier call history rows"],
        ["Booked Loads", booked.length, `${calls.length ? percent(booked.length / calls.length) : "0%"} booking rate`],
        ["Rate Declines", declines.length, "Carrier ask exceeded authority"],
        ["Avg Booked Rate", money(avgBookedRate), "Accepted loads only"],
        ["Avg Gap To Book", money(avgGap), "Carrier ask minus last offer"],
        ["Mood Split", `${friendly}/${hostile}`, "Friendly / Hostile"]
      ];

      document.getElementById("metrics").innerHTML = metricItems.map(([label, value, note]) => `
        <article class="metric">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-note">${note}</div>
        </article>
      `).join("");

      const laneGroups = new Map();
      for (const call of calls) {
        const key = laneKey(call);
        if (!laneGroups.has(key)) {
          laneGroups.set(key, { lane: key, equipment: call.equipment_type, calls: [], booked: 0 });
        }
        const group = laneGroups.get(key);
        group.calls.push(call);
        if (isBooked(call)) group.booked += 1;
      }

      const laneRows = [...laneGroups.values()]
        .sort((a, b) => b.calls.length - a.calls.length);
      const maxLaneCalls = Math.max(...laneRows.map((row) => row.calls.length), 1);

      document.getElementById("lanePerformance").innerHTML = laneRows.map((row) => {
        const bookingRate = row.booked / row.calls.length;
        const width = Math.max(8, (row.calls.length / maxLaneCalls) * 100);
        return `
          <div class="bar-row">
            <div>
              <div class="lane">${row.lane}</div>
              <div class="subtle">${row.equipment} · ${row.calls.length} calls · ${percent(bookingRate)} booked</div>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <div class="num">${row.booked}/${row.calls.length}</div>
          </div>
        `;
      }).join("");

      const followUps = declines
        .filter((call) => validAsk(call) && call.last_offered_rate)
        .map((call) => ({
          ...call,
          gap: Number(call.carrier_requested_rate) - Number(call.last_offered_rate)
        }))
        .sort((a, b) => a.gap - b.gap)
        .slice(0, 5);

      document.getElementById("opportunities").innerHTML = followUps.length ? followUps.map((call) => {
        const priority = call.gap <= 250 ? "Hot" : call.gap <= 500 ? "Warm" : "Monitor";
        return `
          <div class="opportunity">
            <div>
              <div class="lane">${call.carrier_name}</div>
              <div class="subtle">${laneKey(call)} · ${call.equipment_type} · ${priority} follow-up</div>
              <div class="summary">${call.summary}</div>
            </div>
            <div class="gap">${money(call.gap)} gap</div>
          </div>
        `;
      }).join("") : "<div class=\"subtle\">No rate-decline follow-up opportunities yet.</div>";

      const pricingRows = [
        ["Booked below authority", booked.filter((call) => call.final_rate < call.letterboard_rate).length, booked.length, "secondary"],
        ["Booked at authority", booked.filter((call) => call.final_rate >= call.letterboard_rate).length, booked.length, ""],
        ["Declined at authority", declines.filter((call) => call.last_offered_rate >= call.letterboard_rate).length, declines.length, ""],
        ["Hostile calls", hostile, calls.length, "secondary"]
      ];

      document.getElementById("pricingMix").innerHTML = pricingRows.map(([label, value, total, tone]) => {
        const width = total ? Math.max(5, (value / total) * 100) : 0;
        return `
          <div class="bar-row">
            <div class="lane">${label}</div>
            <div class="bar-track"><div class="bar-fill ${tone}" style="width:${width}%"></div></div>
            <div class="num">${value}/${total}</div>
          </div>
        `;
      }).join("");

      document.getElementById("recentCalls").innerHTML = sorted.slice(0, 8).map((call) => {
        const outcomeClass = isBooked(call) ? "pill-booked" : "pill-decline";
        const moodClass = call.mood === "Hostile" ? "pill-hostile" : "pill-friendly";
        const outcome = isBooked(call) ? "Booked" : "Rate decline";
        return `
          <tr>
            <td>
              <div class="lane">${call.carrier_name}</div>
              <div class="subtle">${call.mc_number}</div>
            </td>
            <td>${laneKey(call)}</td>
            <td>${call.equipment_type}</td>
            <td class="num">${validAsk(call) ? money(call.carrier_requested_rate) : "Outlier"}</td>
            <td class="num">${money(call.last_offered_rate)}</td>
            <td><span class="pill ${outcomeClass}">${outcome}</span></td>
            <td><span class="pill ${moodClass}">${call.mood}</span></td>
          </tr>
        `;
      }).join("");
    }

    async function loadDashboard() {
      try {
        const response = await fetch("/dashboard-data", { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Dashboard data returned ${response.status}`);
        const payload = await response.json();
        if (payload.rows && payload.rows.length) {
          renderDashboard(payload.rows, "HappyRobot Twin live data");
          return;
        }
        renderDashboard(fallbackCalls, "Demo fallback snapshot");
      } catch (error) {
        renderDashboard(fallbackCalls, "Demo fallback snapshot");
      }
    }

    loadDashboard();
  </script>
</body>
</html>
