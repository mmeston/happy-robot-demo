<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrier Sales Operations</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #18202b;
      --muted: #667085;
      --line: #d9dee7;
      --teal: #087f8c;
      --green: #238636;
      --amber: #b7791f;
      --red: #c2410c;
      --blue: #315f9f;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1440px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 750;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .stamp {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .metric,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 112px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
    }

    .content {
      grid-template-columns: 1.05fr 0.95fr;
      align-items: start;
      margin-bottom: 16px;
    }

    .database-table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
    }

    .database-table th,
    .database-table td {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .database-table th:nth-child(1),
    .database-table td:nth-child(1) { width: 92px; }

    .database-table th:nth-child(2),
    .database-table td:nth-child(2) { width: 170px; }

    .database-table th:nth-child(3),
    .database-table td:nth-child(3) { width: 64px; }

    .database-table th:nth-child(4),
    .database-table td:nth-child(4) { width: 175px; }

    .database-table th:nth-child(5),
    .database-table td:nth-child(5) { width: 86px; }

    .database-table th:nth-child(6),
    .database-table td:nth-child(6),
    .database-table th:nth-child(9),
    .database-table td:nth-child(9) { width: 72px; }

    .database-table th:nth-child(7),
    .database-table td:nth-child(7) { width: 92px; }

    .database-table th:nth-child(8),
    .database-table td:nth-child(8) { width: 98px; }

    .database-table th:nth-child(10),
    .database-table td:nth-child(10) { width: 106px; }

    .database-table th:nth-child(11),
    .database-table td:nth-child(11) { width: 340px; }

    .summary-cell {
      width: 340px;
      max-width: 340px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      line-height: 1.35;
      color: #344054;
    }

    .nowrap {
      white-space: nowrap;
    }

    .insights {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .panel {
      padding: 18px;
      overflow: hidden;
    }

    .insight-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .insight-title {
      font-size: 18px;
      font-weight: 760;
      margin-bottom: 6px;
    }

    .insight-copy {
      color: #344054;
      font-size: 13px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 750;
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 0 10px 9px 0;
      white-space: nowrap;
    }

    td {
      border-bottom: 1px solid #edf0f5;
      padding: 11px 10px 11px 0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .lane {
      font-weight: 690;
    }

    .subtle {
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .pill-booked {
      background: #e9f7ec;
      border-color: #b8e3c1;
      color: var(--green);
    }

    .pill-decline {
      background: #fff4e5;
      border-color: #f1ce9a;
      color: var(--amber);
    }

    .pill-hostile {
      background: #fff0eb;
      border-color: #ffc9b8;
      color: var(--red);
    }

    .pill-friendly {
      background: #eaf4ff;
      border-color: #bddbff;
      color: var(--blue);
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(170px, 0.85fr) minmax(140px, 1fr) 70px;
      gap: 12px;
      align-items: center;
      min-height: 34px;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf0f5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
      min-width: 3px;
    }

    .bar-fill.secondary {
      background: var(--blue);
    }

    .opportunities {
      display: grid;
      gap: 12px;
    }

    .opportunity {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #edf0f5;
    }

    .opportunity:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .gap {
      color: var(--red);
      font-weight: 780;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .summary {
      max-width: 440px;
      color: #344054;
    }

    @media (max-width: 1100px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .content {
        grid-template-columns: 1fr;
      }

      .insights {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 1440px);
        padding-top: 18px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .stamp {
        text-align: left;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .panel {
        overflow-x: auto;
      }

      table {
        min-width: 760px;
      }

      .database-table {
        min-width: 1500px;
      }

      .bar-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>

    const toNumber = (value) => {
      if (value === null || value === undefined || value === "") return null;
      if (String(value).toLowerCase() === "null") return null;
      const parsed = Number(value);
      return Number.isNaN(parsed) ? null : parsed;
    };

    const normalizeCall = (call) => ({
      ...call,
      offered_rate: toNumber(call.offered_rate),
      carrier_requested_rate: toNumber(call.carrier_requested_rate),
      final_rate: toNumber(call.final_rate),
      letterboard_rate: toNumber(call.letterboard_rate || call.loadboard_rate),
      last_offered_rate: toNumber(call.last_offered_rate),
      outcome: call.outcome || "Unknown",
      mood: call.mood || "Unknown",
      carrier_name: call.carrier_name || "Unknown carrier",
      mc_number: call.mc_number || "-",
      origin: call.origin || "Unknown origin",
      destination: call.destination || "Unknown destination",
      equipment_type: call.equipment_type || "-",
      summary: call.summary || "No summary captured.",
      call_status: call.call_status || "-",
      call_end_event: call.call_end_event || "-",
      created_at: call.created_at || new Date().toISOString(),
      call_duration_seconds: toNumber(call.call_duration_seconds),
      negotiation_rounds: toNumber(call.negotiation_rounds),
      tool_call_count: toNumber(call.tool_call_count),
      transfer_completed: call.transfer_completed === true || call.transfer_completed === 1
    });

    const money = (value) => {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(Number(value));
    };

    const duration = (seconds) => {
      if (seconds === null || seconds === undefined || Number.isNaN(Number(seconds))) return "-";
      const total = Number(seconds);
      const mins = Math.floor(total / 60);
      const secs = total % 60;
      return `${mins}:${String(secs).padStart(2, "0")}`;
    };

    const percent = (value) => `${Math.round(value * 100)}%`;

      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }).format(date);

    const isBooked = (call) => {
      const outcome = String(call.outcome || "").toLowerCase();
      return outcome.includes("sucess") || outcome.includes("success") || outcome.includes("booked") || call.final_rate !== null;
    };
    const isRateDecline = (call) => String(call.outcome || "").toLowerCase().includes("rate");
    const validAsk = (call) => Number(call.carrier_requested_rate) > 0 && Number(call.carrier_requested_rate) < 10000;
    const laneKey = (call) => `${call.origin} -> ${call.destination}`;
    const displayOutcome = (call) => {
      const outcome = String(call.outcome || "").toLowerCase();
      if (isBooked(call)) return "Booked";
      if (outcome.includes("rate")) return "Rate decline";
      if (outcome.includes("no_match")) return "No match";
      if (outcome.includes("eligible")) return "Not eligible";
      if (outcome.includes("not_interested")) return "Passed";
      return call.outcome || "Unknown";
    };

    const avg = (items, pick) => {
      const values = items.map(pick).filter((value) => value !== null && value !== undefined && !Number.isNaN(Number(value)));
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + Number(value), 0) / values.length;
    };

    function renderDashboard(rawCalls, sourceLabel) {
      const calls = rawCalls.map(normalizeCall);
      const sorted = [...calls].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const booked = calls.filter(isBooked);
      const declines = calls.filter(isRateDecline);
      const avgSavings = avg(booked, (call) => {
        if (!call.letterboard_rate || !call.final_rate) return null;
        return Number(call.letterboard_rate) - Number(call.final_rate);
      });
      const avgDuration = avg(calls, (call) => call.call_duration_seconds);
      const friendly = calls.filter((call) => call.mood === "Friendly").length;
      const neutral = calls.filter((call) => call.mood === "Neutral").length;
      const hostile = calls.filter((call) => call.mood === "Hostile").length;
      const followUpCandidates = declines
        .filter((call) => validAsk(call) && call.last_offered_rate)
        .map((call) => ({
          ...call,
          gap: Number(call.carrier_requested_rate) - Number(call.last_offered_rate)
        }))
        .filter((call) => call.gap > 0 && call.gap <= 500);
      const closeFollowUps = followUpCandidates.filter((call) => call.gap <= 250).length;
      const laneCounts = new Map();
      for (const call of calls) {
        const key = laneKey(call);
        laneCounts.set(key, (laneCounts.get(key) || 0) + 1);
      }
      const topLane = [...laneCounts.entries()].sort((a, b) => b[1] - a[1])[0];

      document.getElementById("dataSource").textContent = sourceLabel;
      document.getElementById("lastUpdated").textContent = sorted.length
        ? new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeStyle: "short" }).format(new Date(sorted[0].created_at))
        : "No calls captured yet";

      const metricItems = [
        ["Total Calls", calls.length, "Carrier call history rows"],
        ["Booked Loads", booked.length, `${calls.length ? percent(booked.length / calls.length) : "0%"} booking rate`],
        ["Avg Savings", money(avgSavings), "Booked rate below authority"],
        ["Rate Declines", declines.length, "Carrier ask exceeded authority"],
        ["Follow-Ups", followUpCandidates.length, "Close gaps worth rep action"],
        ["Avg Handle Time", duration(Math.round(avgDuration || 0)), "Call duration from workflow"]
      ];

      document.getElementById("metrics").innerHTML = metricItems.map(([label, value, note]) => `
        <article class="metric">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-note">${note}</div>
        </article>
      `).join("");

      const opsBrief = [
        [
          "Demand Signal",
          topLane ? `${topLane[0]} is hottest` : "No lane activity yet",
          topLane ? `${topLane[1]} calls came in on this lane, so it is the first place a brokerage rep should watch capacity and price movement.` : "Calls will populate this read as the workflow writes rows."
        ],
        [
          "Pricing Read",
          avgSavings !== null ? `${money(avgSavings)} average savings` : "No booked savings yet",
          booked.length ? `Booked loads are closing below listed authority on average, which shows Nancy is protecting margin while still converting freight.` : "Once loads book, this shows how much margin the agent preserved."
        ],
        [
          "Rep Action",
          `${followUpCandidates.length} follow-up targets`,
          closeFollowUps ? `${closeFollowUps} declined calls were within $250 of the last offer. Sentiment is ${friendly}/${neutral}/${hostile} friendly, neutral, hostile.` : `Sentiment is ${friendly}/${neutral}/${hostile} friendly, neutral, hostile. No close rate-decline callbacks are waiting right now.`
        ]
      ];

      document.getElementById("opsBrief").innerHTML = opsBrief.map(([label, title, copy]) => `
        <article class="panel">
          <div class="insight-label">${label}</div>
          <div class="insight-title">${title}</div>
          <div class="insight-copy">${copy}</div>
        </article>
      `).join("");

      const workflowChecks = [
        {
          label: "Carrier identified",
          passed: calls.filter((call) => call.carrier_name && call.carrier_name !== "Unknown carrier").length,
          total: calls.length,
          note: "Carrier name captured from verification flow"
        },
        {
          label: "Load search resolved",
          passed: calls.filter((call) => call.load_id || String(call.outcome).toLowerCase().includes("no_match") || String(call.outcome).toLowerCase().includes("eligible")).length,
          total: calls.length,
          note: "Found a load, ended as no-match, or stopped on eligibility"
        },
        {
          label: "Pricing guidance used",
          passed: calls.filter((call) => call.last_offered_rate || ["no_match", "carrier_not_eligible"].includes(String(call.outcome).toLowerCase())).length,
          total: calls.length,
          note: "Rate calls have an agent offer; no-load and ineligible calls bypass pricing"
        },
        {
          label: "Booked calls transferred",
          passed: booked.filter((call) => call.transfer_completed).length,
          total: booked.length,
          note: "Booked loads reached final handoff"
        },
        {
          label: "No-match calls closed",
          passed: calls.filter((call) => String(call.outcome).toLowerCase().includes("no_match") && !call.transfer_completed && !call.last_offered_rate).length,
          total: calls.filter((call) => String(call.outcome).toLowerCase().includes("no_match")).length,
          note: "No-load calls ended without pricing or transfer"
        }
      ];

      document.getElementById("workflowHealth").innerHTML = workflowChecks.map((row) => {
        const width = row.total ? Math.max(5, (row.passed / row.total) * 100) : 0;
        return `
          <div class="bar-row">
            <div>
              <div class="lane">${row.label}</div>
              <div class="subtle">${row.note}</div>
            </div>
            <div class="bar-track"><div class="bar-fill secondary" style="width:${width}%"></div></div>
            <div class="num">${row.passed}/${row.total}</div>
          </div>
        `;
      }).join("");

      const followUps = declines
        .filter((call) => validAsk(call) && call.last_offered_rate)
        .map((call) => ({
          ...call,
          gap: Number(call.carrier_requested_rate) - Number(call.last_offered_rate)
        }))
        .filter((call) => call.gap > 0)
        .sort((a, b) => a.gap - b.gap)
        .slice(0, 5);

      document.getElementById("opportunities").innerHTML = followUps.length ? followUps.map((call) => {
        const priority = call.gap <= 250 ? "Hot" : call.gap <= 500 ? "Warm" : "Monitor";
        return `
          <div class="opportunity">
            <div>
              <div class="lane">${call.carrier_name}</div>
              <div class="subtle">${laneKey(call)} · ${call.equipment_type} · ${priority} follow-up</div>
              <div class="summary">${call.summary}</div>
            </div>
            <div class="gap">${money(call.gap)} gap</div>
          </div>
        `;
      }).join("") : "<div class=\"subtle\">No rate-decline follow-up opportunities yet.</div>";

      const pricingRows = [
        ["Booked below authority", booked.filter((call) => call.final_rate < call.letterboard_rate).length, booked.length, "secondary"],
        ["Booked at authority", booked.filter((call) => call.final_rate >= call.letterboard_rate).length, booked.length, ""],
        ["Declined at authority", declines.filter((call) => call.last_offered_rate >= call.letterboard_rate).length, declines.length, ""],
        ["Mock transfers completed", calls.filter((call) => call.transfer_completed).length, booked.length, "secondary"]
      ];

      document.getElementById("pricingMix").innerHTML = pricingRows.map(([label, value, total, tone]) => {
        const width = total ? Math.max(5, (value / total) * 100) : 0;
        return `
          <div class="bar-row">
            <div class="lane">${label}</div>
            <div class="bar-track"><div class="bar-fill ${tone}" style="width:${width}%"></div></div>
            <div class="num">${value}/${total}</div>
          </div>
        `;
      }).join("");

      document.getElementById("callDatabase").innerHTML = sorted.map((call) => {
        const outcomeClass = isBooked(call) ? "pill-booked" : "pill-decline";
        const moodClass = call.mood === "Hostile" ? "pill-hostile" : call.mood === "Neutral" ? "pill-decline" : "pill-friendly";
        const outcome = displayOutcome(call);
        return `
          <tr>
            <td class="nowrap">${shortDateTime(call.created_at)}</td>
            <td>
              <div class="lane">${call.carrier_name}</div>
              <div class="subtle">${call.mc_number}</div>
            </td>
            <td class="nowrap">${call.load_id || "-"}</td>
            <td>${laneKey(call)}</td>
            <td>${call.equipment_type}</td>
            <td class="num">${validAsk(call) ? money(call.carrier_requested_rate) : "-"}</td>
            <td class="num">${money(call.last_offered_rate)}</td>
            <td class="num">${money(call.letterboard_rate)}</td>
            <td class="num">${money(call.final_rate)}</td>
            <td><span class="pill ${outcomeClass}">${outcome}</span></td>
            <td class="summary-cell">${call.summary}</td>
          </tr>
        `;
      }).join("");
    }

    async function loadDashboard() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("source") === "demo") {
        renderDashboard(demoCalls, "Curated demo reporting dataset");
        return;
      }

      try {
        const response = await fetch("/dashboard-data", { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Dashboard data returned ${response.status}`);
        const payload = await response.json();
        if (payload.rows && payload.rows.length) {
          renderDashboard([...demoCalls, ...payload.rows], "Demo baseline + live reporting database");
          return;
        }
        renderDashboard(demoCalls, "Curated demo reporting dataset");
      } catch (error) {
        renderDashboard(demoCalls, "Curated demo reporting dataset");
      }
    }

    loadDashboard();
  </script>
</body>
</html>
